<!DOCTYPE html>
<html lang="zh-CN">

    <style>

        body.dark {

            --bg-paper: #2c3a3a;
            --sidebar-bg: #2a3630;
            --sidebar-border: #5a6e5a;
            --text-dark: #e8e0c8;
            --text-muted: #c9b08c;
            --accent-primary: #e8a87c;
            --card-bg: #3a4a40;
            --card-border: #6a806a;
            --btn-bg: #4a5a50;

        }
        body.warm {

            --sidebar-bg: #faf0e0;
            --sidebar-border: #e0c8a8;
            --text-dark: #5e3a2a;
            --text-muted: #a87850;
            --accent-primary: #e88a50;
            --card-bg: #fffaf0;
            --card-border: #f0d8b0;

            --btn-hover: #ffe0c0;

        body {

        .sidebar.collapsed .notebook-item { justify-content: center; }

        .cover-content { position: relative; width: 100%; height: 100%; z-index: 1; }
        .title-wrapper { position: absolute; top: 15%; left: 0; right: 0; display: flex; justify-content: center; pointer-events: none; }
        .title-bg { position: absolute; top: -20px; bottom: -20px; left: 10%; right: 10%; background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 15%, rgba(255,255,255,0.6) 40%, rgba(255,255,255,0.6) 60%, rgba(255,255,255,0.15) 85%, rgba(255,255,255,0) 100%); border-radius: 60px; z-index: 0; }
        .notebook-title-cover {

            font-size: 2.8rem;
            font-weight: 500;
            letter-spacing: 6px;
            text-align: center;
            white-space: nowrap;
            background: linear-gradient(135deg, #f2cc8a, #d9a05c, #b8783a);
            -webkit-background-clip: text;
            background-clip: text;

            pointer-events: auto;
            cursor: pointer;
        }
        @media (max-width: 800px) { .notebook-title-cover { font-size: 2rem; letter-spacing: 4px; white-space: normal; width: 90%; } }
        .stack-container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .stack-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(8px);
            opacity: 0.8;
            z-index: 0;
            border-radius: inherit;
        }
        .stack-content {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .close-cover-btn-top {
            position: absolute;
            top: 8px;
            left: 8px;
            background: #d9b48b;
            border: none;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.85rem;
            cursor: pointer;
            color: #4a2e18;
            display: inline-flex;

            z-index: 200;

        }
        .close-cover-btn-top:hover { background: #c49a6c; transform: scale(1.02); }
        .cards-area {
            position: relative;
            width: 100%;
            min-height: 380px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
        }
        .cards-stack {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 360px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .stack-card {
            position: absolute;
            left: 50%;
            top: 50%;
            transform-origin: center center;
            cursor: pointer;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.25s, opacity 0.2s;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 14px 12px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 160px;
            aspect-ratio: 148 / 210;
        }
        .stack-card .card-title { font-size: 1rem; font-weight: 500; margin-bottom: 8px; word-break: break-word; line-height: 1.3; text-align: center; }
        .stack-card .card-date { font-size: 0.65rem; color: var(--text-muted); margin-bottom: 8px; display: flex; justify-content: space-between; }
        .stack-card .card-preview-text { font-size: 0.7rem; color: var(--text-dark); overflow-y: auto; max-height: 120px; white-space: pre-wrap; word-break: break-word; line-height: 1.35; text-indent: 0; }
        .carousel-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: #ffdbb5;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 60px;
            font-size: 1.6rem;
            cursor: pointer;
            color: #885a34;
            z-index: 200;
        }
        .carousel-arrow:hover { background: #f5bc7a; transform: translateY(-50%) scale(1.05); }
        .carousel-arrow-left { left: 4px; }
        .carousel-arrow-right { right: 4px; }
        .carousel-arrow.hidden-btn { visibility: hidden; pointer-events: none; opacity: 0; }
        .cards-empty { text-align: center; color: var(--text-muted); padding: 40px; font-size: 0.9rem; }
        .edit-form { display: flex; flex-direction: column; gap: 20px; background: #fffef7; padding: 16px; border-radius: 12px; flex: 1; }
        .edit-form input#editTitle { font-size: 1.8rem; font-weight: 600; padding: 8px 0; border: none; border-bottom: 2px solid #d9b48b; background: transparent; border-radius: 0; outline: none; color: #3b2a1f; }
        .options-row { display: flex; justify-content: flex-start; gap: 20px; margin: 8px 0; background: #fef7ef; padding: 10px 16px; border-radius: 40px; flex-wrap: wrap; }
        .color-row, .date-row, .notebook-select-row { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; color: #b88251; }
        .color-row input { width: 32px; height: 32px; border: 1px solid #ddc8b0; border-radius: 30px; cursor: pointer; }
        .date-row input, .notebook-select-row select { border: 1px solid #ddc8b0; border-radius: 30px; padding: 6px 12px; font-size: 0.8rem; background: #fffbf5; }
        .rich-editor {
            background: repeating-linear-gradient(to bottom, transparent, transparent 26px, #e9dbc9 26px, #e9dbc9 27px);
            background-position: 0 4px;
            line-height: 27px;
            font-size: 1rem;
            border: 1px solid #f0e2d4;
            border-radius: 8px;
            padding: 10px 12px;
            color: #2f241b;

            overflow-y: auto;

        .tool-btn { background: #fff0e0; border: 1px solid #ddc8b0; border-radius: 30px; padding: 6px 12px; font-size: 0.75rem; cursor: pointer; }
        .tool-btn:hover { background: #e9dbc9; }
        .color-picker { width: 32px; height: 32px; border: 1px solid #ddc8b0; border-radius: 30px; cursor: pointer; background: white; }
        .font-select { border: 1px solid #ddc8b0; border-radius: 30px; padding: 6px 12px; font-size: 0.75rem; background: #fffbf5; cursor: pointer; }
        .save-wrapper { display: flex; justify-content: flex-end; margin-top: 16px; }
        .save-btn { background: #e48f3b; border: none; color: white; padding: 10px 24px; border-radius: 40px; cursor: pointer; font-size: 1rem; }
        .save-btn:hover { background: #c57129; }
        .read-header { display: flex; justify-content: flex-end; gap: 18px; margin-bottom: 24px; }
        .action-icon { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: #b67b47; }
        .diary-title { font-size: 1.8rem; font-weight: 600; margin: 16px 0 8px; }
        .diary-meta { font-size: 0.75rem; color: #b88251; margin-bottom: 16px; display: flex; gap: 16px; flex-wrap: wrap; }
        .diary-body { white-space: pre-wrap; line-height: 1.6; font-size: 0.95rem; color: #2f241b; text-indent: 2em; }
        .firework-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; overflow: hidden; }
        .firework-particle { position: absolute; width: 14px; height: 14px; border-radius: 50%; opacity: 0.95; animation: flyBig 1.5s ease-out forwards; }
        @keyframes flyBig { 0% { transform: translate(0, 0) scale(0.4); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0.2); opacity: 0; } }
        .heart-particle { position: absolute; font-size: 20px; width: auto; height: auto; background: transparent; animation: floatHeartBig 1.8s ease-out forwards; }
        @keyframes floatHeartBig { 0% { transform: translate(0, 0) scale(0.3); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(1.5); opacity: 0; } }
        .petal { position: fixed; pointer-events: none; z-index: 10000; font-size: 20px; animation: fall 2.5s ease-in forwards; }
        @keyframes fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(400px) rotate(360deg); opacity: 0; } }
        .easter-egg { position: fixed; bottom: 24px; right: 24px; width: 48px; height: 48px; background: rgba(255,220,180,0.95); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; font-size: 24px; }

<body>
<div class="app-container">
    <div class="sidebar" id="sidebar">
        <div class="logo-area">
            <h2>Dear Diary</h2>
            <div class="theme-switch">
                <button class="theme-btn" data-theme="light">☀️</button>
                <button class="theme-btn" data-theme="dark">🌙</button>
                <button class="theme-btn" data-theme="warm">🔥</button>
            </div>
            <button class="toggle-sidebar-btn" id="toggleSidebarBtn"><i class="fas fa-chevron-left" id="toggleIcon"></i></button>
        </div>
        <div id="userInfoArea" class="user-info" style="display: none;">
            <span id="userEmail">匿名用户</span>

        </div>
        <div class="nav-buttons">
            <div class="nav-btn" id="addDiaryBtn"><i class="fas fa-plus-circle"></i> <span>新增日记</span></div>
            <div class="nav-btn" id="importBtn"><i class="fas fa-file-import"></i> <span>导入 (JSON)</span></div>
            <div class="nav-btn" id="exportBtn"><i class="fas fa-file-export"></i> <span>导出全部数据</span></div>
            <div class="nav-btn" id="addNotebookBtn"><i class="fas fa-book"></i> <span>新增日记本</span></div>
            <div class="nav-btn" id="listNotebooksBtn"><i class="fas fa-layer-group"></i> <span>罗列日记本</span></div>
        </div>
        <div class="notebook-list-section">
            <div class="section-title"><i class="fas fa-book-open"></i> 日记册</div>
            <div id="notebookListContainer" class="notebook-list"></div>
        </div>
    </div>
    <div class="right-paper">
        <div class="a5-container" id="rightContentArea">
            <div id="coverView" class="view"></div>
            <div id="stackView" class="view hide-view"></div>
            <div id="readView" class="view hide-view"></div>
            <div id="editView" class="view hide-view"></div>
        </div>
    </div>
</div>
<div class="easter-egg" id="easterEggBtn">🐾</div>
<script>
    if (typeof cloudbase === 'undefined') {
        alert("SDK加载失败，请检查网络或刷新页面重试。");
        throw new Error("cloudbase not defined");
    }
    const ENV_ID = "mlb-gg-3gs4nsbl5fefaec3";
    const app = cloudbase.init({ env: ENV_ID });
    const auth = app.auth();
    const db = app.database();

    let currentUser = null;
    let appData = { notebooks: [], entries: [] };
    let currentNotebookId = null;
    let currentMode = "cover";
    let currentEntry = null;
    let currentStackIndex = 0;
    let isSidebarCollapsed = false;
    let currentCoverStyle = { backgroundColor: "#f9ddd6", backgroundImage: null };

    function showError(msg) {
        let toast = document.querySelector('.error-toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.className = 'error-toast';
            document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 5000);
        console.error(msg);
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    async function saveToCloud() {
        if (!currentUser) return;
        const userDoc = db.collection('users').doc(currentUser.uid);
        await userDoc.set({
            notebooks: appData.notebooks,
            entries: appData.entries,
            lastUpdated: new Date().toISOString()
        });
    }

    async function loadFromCloud() {
        if (!currentUser) return;
        const userDoc = db.collection('users').doc(currentUser.uid);
        const res = await userDoc.get();
        if (res.data) {
            const data = res.data;
            appData.notebooks = data.notebooks || [];
            appData.entries = data.entries || [];
            for(let e of appData.entries) {
                if(!e.cardColor) e.cardColor = "#FFF3E6";
                if(!e.diaryDate) e.diaryDate = e.createdAt ? new Date(e.createdAt).toISOString().slice(0,10) : new Date().toISOString().slice(0,10);
                if(!e.textAlign) e.textAlign = "left";
                if(!e.contentHtml) e.contentHtml = e.content ? escapeHtml(e.content).replace(/\n/g, '<br>') : "";
            }
            for(let nb of appData.notebooks) if(!nb.coverImageUrl) nb.coverImageUrl = "https://picsum.photos/id/104/400/500";
        } else {
            initDefaultData();
            await saveToCloud();
        }
        if(appData.notebooks.length===0) initDefaultData();
        if(!currentNotebookId || !appData.notebooks.find(n=>n.id==currentNotebookId)) currentNotebookId = appData.notebooks[0]?.id;
        loadCoverStyle();
        renderNotebookList();
        refreshCurrentUI();
    }

    function initDefaultData() {
        appData.notebooks = [
            { id: "nb_1", name: "春日随想", coverImageUrl: "https://picsum.photos/id/20/400/500" },
            { id: "nb_2", name: "工作笔记", coverImageUrl: "https://picsum.photos/id/26/400/500" }
        ];
        const t = new Date().toISOString();
        appData.entries = [
            { id: "e1", notebookId: "nb_1", title: "初春的雨", content: "窗外的雨淅淅沥沥...", contentHtml: "窗外的雨淅淅沥沥...", createdAt: t, updatedAt: t, cardColor: "#E6F0FA", diaryDate: "2025-03-10", textAlign: "left" },
            { id: "e2", notebookId: "nb_1", title: "樱花盛开", content: "公园里的樱花开了...", contentHtml: "公园里的樱花开了...", createdAt: t, updatedAt: t, cardColor: "#FFE6F0", diaryDate: "2025-03-15", textAlign: "left" }
        ];
        currentNotebookId = "nb_1";
    }

    function getCurrentEntries() {
        return appData.entries.filter(e=>e.notebookId===currentNotebookId).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    }

    function loadCoverStyle() {
        const nb = appData.notebooks.find(n=>n.id===currentNotebookId);
        if(nb && nb.coverStyle) currentCoverStyle = nb.coverStyle;
        else currentCoverStyle = { backgroundColor: "#f9ddd6", backgroundImage: null };
    }

    function saveCoverStyle() {
        const nb = appData.notebooks.find(n=>n.id===currentNotebookId);
        if(nb) { nb.coverStyle = {...currentCoverStyle}; saveToCloud(); }
    }

    function toggleSidebar() {
        isSidebarCollapsed = !isSidebarCollapsed;
        document.getElementById("sidebar").classList.toggle("collapsed", isSidebarCollapsed);
        localStorage.setItem("sidebar_collapsed", isSidebarCollapsed);
    }
    function loadSidebarState() {
        if(localStorage.getItem("sidebar_collapsed")==='true') toggleSidebar();
    }

    async function renderNotebookList() {
        const container = document.getElementById("notebookListContainer");
        if(!container) return;
        if(appData.notebooks.length===0) {
            container.innerHTML="<div style='padding:8px;color:var(--text-muted);'>✨ 暂无日记本</div>";
            return;
        }
        container.innerHTML = appData.notebooks.map(nb=>`<div class="notebook-item ${currentNotebookId===nb.id?'active':''}" data-id="${nb.id}"><div class="notebook-info"><span class="notebook-name">📔 ${escapeHtml(nb.name)}</span><span class="notebook-count">${appData.entries.filter(e=>e.notebookId===nb.id).length} 篇</span></div><div class="notebook-actions"><button class="action-icon-sm rename-notebook" data-id="${nb.id}"><i class="fas fa-pen"></i></button><button class="action-icon-sm change-cover" data-id="${nb.id}"><i class="fas fa-image"></i></button><button class="del-notebook" data-id="${nb.id}"><i class="fas fa-trash-alt"></i></button></div></div>`).join('');
        document.querySelectorAll('.notebook-item').forEach(el=>el.addEventListener('click',(e)=>{ if(!e.target.closest('.notebook-actions')) switchNotebook(el.dataset.id); }));
        document.querySelectorAll('.rename-notebook').forEach(btn=>btn.addEventListener('click',async(e)=>{ e.stopPropagation(); const nbId=btn.dataset.id, nb=appData.notebooks.find(n=>n.id===nbId); if(nb){ const newName=prompt("新名称",nb.name); if(newName) { nb.name=newName; await saveToCloud(); renderNotebookList(); if(currentNotebookId===nbId) renderCoverPage(); } } }));
        document.querySelectorAll('.change-cover').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); const nbId=btn.dataset.id; showCoverCustomModal(appData.notebooks.find(n=>n.id===nbId)); }));
        document.querySelectorAll('.del-notebook').forEach(btn=>btn.addEventListener('click',async(e)=>{ e.stopPropagation(); const nbId=btn.dataset.id; if(confirm("删除日记本及所有日记？")){ appData.notebooks=appData.notebooks.filter(n=>n.id!==nbId); appData.entries=appData.entries.filter(e=>e.notebookId!==nbId); if(appData.notebooks.length===0) initDefaultData(); if(currentNotebookId===nbId) currentNotebookId=appData.notebooks[0]?.id; await saveToCloud(); renderNotebookList(); showCoverView(); refreshCurrentUI(); } }));
    }

    function showCoverCustomModal(notebook) {
        let style = notebook.coverStyle || { backgroundColor: "#f9ddd6", backgroundImage: null };
        const modal = document.createElement('div'); modal.className='login-overlay'; modal.innerHTML=`<div class="login-card"><h3>定制封面</h3><div class="color-row"><span>🎨 背景色</span><input type="color" id="modalColorPicker" value="${style.backgroundColor}"></div><button id="modalUploadImageBtn">上传图片</button><button id="modalResetBtn">重置为纯色</button><button id="modalCloseBtn">关闭</button></div>`;
        document.body.appendChild(modal);
        const colorPicker=modal.querySelector('#modalColorPicker'), uploadBtn=modal.querySelector('#modalUploadImageBtn'), resetBtn=modal.querySelector('#modalResetBtn'), closeBtn=modal.querySelector('#modalCloseBtn');
        colorPicker.addEventListener('input',async()=>{ style.backgroundColor=colorPicker.value; style.backgroundImage=null; notebook.coverStyle=style; await saveToCloud(); if(currentNotebookId===notebook.id) { currentCoverStyle=style; if(currentMode==='cover') renderCoverPage(); } });
        uploadBtn.addEventListener('click',()=>{ const input=document.createElement('input'); input.type='file'; input.accept='image/*'; input.onchange=async(e)=>{ const file=e.target.files[0]; if(file){ const reader=new FileReader(); reader.onload=async(ev)=>{ style.backgroundImage=ev.target.result; style.backgroundColor="#f9ddd6"; notebook.coverStyle=style; await saveToCloud(); if(currentNotebookId===notebook.id){ currentCoverStyle=style; if(currentMode==='cover') renderCoverPage(); } }; reader.readAsDataURL(file); } }; input.click(); });
        resetBtn.addEventListener('click',async()=>{ style={backgroundColor:"#f9ddd6", backgroundImage:null}; notebook.coverStyle=style; colorPicker.value="#f9ddd6"; await saveToCloud(); if(currentNotebookId===notebook.id){ currentCoverStyle=style; if(currentMode==='cover') renderCoverPage(); } });
        closeBtn.onclick=()=>modal.remove();

    async function switchNotebook(id) {
        currentNotebookId=id;
        currentStackIndex=0;
        loadCoverStyle();
        await saveToCloud();
        renderNotebookList();
        showCoverView();
        refreshCurrentUI();
    }

    function refreshCurrentUI() {
        if(currentMode==="cover") renderCoverPage();
        else if(currentMode==="stack") renderStackPage();
        else if(currentMode==="read"&&currentEntry) renderReadPage();
        else if(currentMode==="edit") renderEditPage();
        else showCoverView();
    }
    function showCoverView() { currentMode="cover"; hideAllViews(); document.getElementById("coverView").classList.remove("hide-view"); renderCoverPage(); }
    function showStackView() { currentMode="stack"; hideAllViews(); document.getElementById("stackView").classList.remove("hide-view"); renderStackPage(); }
    function showReadView(entry) { currentEntry=entry; currentMode="read"; hideAllViews(); document.getElementById("readView").classList.remove("hide-view"); renderReadPage(); }
    function showEditView(entryForEdit, isNew=false) { if(entryForEdit) currentEntry={...entryForEdit}; else currentEntry=null; currentMode="edit"; hideAllViews(); document.getElementById("editView").classList.remove("hide-view"); renderEditPage(isNew); }
    function hideAllViews() { ["coverView","stackView","readView","editView"].forEach(id=>document.getElementById(id).classList.add("hide-view")); }

    function renderCoverPage() {
        const notebook = appData.notebooks.find(n=>n.id===currentNotebookId);
        if(!notebook) return;
        let styleStr = `background-color: ${currentCoverStyle.backgroundColor};`;
        if(currentCoverStyle.backgroundImage) styleStr += ` background-image: url(${currentCoverStyle.backgroundImage}); background-size: cover; background-position: center;`;
        document.getElementById("coverView").innerHTML = `<div class="cover-book-wrapper clickable-cover" id="fullCoverClick" style="${styleStr}"><div class="cover-stiches-top"></div><div class="cover-stiches-bottom"></div><div class="cover-stiches-right"></div><div class="cover-content"><div class="title-wrapper"><div class="title-bg"></div><div class="notebook-title-cover">${escapeHtml(notebook.name)}</div></div></div></div>`;
        document.getElementById("fullCoverClick")?.addEventListener("click",()=>showStackView());
    }

    function renderStackPage() {
        const entries = getCurrentEntries();
        const container = document.getElementById("stackView");
        if(entries.length===0) { container.innerHTML=`<div class="cards-empty">暂无日记，点击「新增日记」开始记录</div>`; return; }
        if(currentStackIndex>=entries.length) currentStackIndex=entries.length-1;
        if(currentStackIndex<0) currentStackIndex=0;
        const total=entries.length;
        const a5=document.querySelector(".a5-container");
        const containerWidth=a5?a5.clientWidth-48:600;
        const maxSpan=containerWidth*0.8;
        let gap=45;
        if(total>1) gap=Math.min(70,Math.max(38,maxSpan/(total-1)));
        const maxOffset=containerWidth*0.4;
        const hasBgImage = currentCoverStyle.backgroundImage;
        let bgStyle = '';
        if(hasBgImage) bgStyle = `background-image: url(${currentCoverStyle.backgroundImage}); background-size: cover; background-position: center; filter: blur(8px); opacity: 0.8;`;
        let cardsHtml = `<div class="stack-container" style="position:relative; height:100%;">`;
        if(hasBgImage) cardsHtml += `<div class="stack-bg" style="${bgStyle}"></div>`;
        cardsHtml += `<div class="stack-content"><button class="close-cover-btn-top" id="closeToCoverBtn"><i class="fas fa-book"></i> 合上</button><div class="cards-area"><div class="cards-stack" id="cardsStack">`;
        for(let i=0;i<entries.length;i++){
            const entry=entries[i], delta=i-currentStackIndex;
            let scale=0.75; if(delta===0) scale=1.3; else if(Math.abs(delta)===1) scale=0.9;
            let offsetX=delta*gap; offsetX=Math.min(Math.max(offsetX,-maxOffset),maxOffset);
            let opacity=1; const ad=Math.abs(delta); if(ad===0) opacity=1; else if(ad===1) opacity=0.8; else if(ad===2) opacity=0.6; else opacity=0.4;
            const z=100-ad, bg=entry.cardColor||"#FFF3E6";
            const textAlign = entry.textAlign || "left";
            const previewText=escapeHtml(entry.content||"").slice(0,80)+(entry.content?.length>80?"…":"");
            cardsHtml+=`<div class="stack-card" data-id="${entry.id}" data-index="${i}" style="background:${bg}; transform:translateX(calc(-50% + ${offsetX}px)) translateY(-50%) scale(${scale}); opacity:${opacity}; z-index:${z}; left:50%; top:50%;"><div class="card-title">${escapeHtml(entry.title)}</div><div class="card-date"><span><i class="far fa-calendar-alt"></i> ${escapeHtml(entry.diaryDate||'未知日期')}</span></div><div class="card-preview-text" style="text-align:${textAlign};">${previewText.replace(/\n/g,'<br>')}</div></div>`;
        }
        cardsHtml+=`</div><button class="carousel-arrow carousel-arrow-left" id="prevStackBtn"><i class="fas fa-chevron-left"></i></button><button class="carousel-arrow carousel-arrow-right" id="nextStackBtn"><i class="fas fa-chevron-right"></i></button></div></div></div>`;
        container.innerHTML=cardsHtml;
        document.getElementById("closeToCoverBtn")?.addEventListener("click",()=>showCoverView());
        const prev=document.getElementById("prevStackBtn"), next=document.getElementById("nextStackBtn");
        if(prev){ if(currentStackIndex===0) prev.classList.add("hidden-btn"); else prev.classList.remove("hidden-btn"); prev.onclick=()=>{ if(currentStackIndex>0) { currentStackIndex--; renderStackPage(); } }; }
        if(next){ if(currentStackIndex===total-1) next.classList.add("hidden-btn"); else next.classList.remove("hidden-btn"); next.onclick=()=>{ if(currentStackIndex<total-1) { currentStackIndex++; renderStackPage(); } }; }
        document.querySelectorAll("#cardsStack .stack-card").forEach(c=>{ const idx=parseInt(c.dataset.index); c.onclick=()=>{ if(idx===currentStackIndex){ const entry=appData.entries.find(e=>e.id===c.dataset.id); if(entry) showReadView(entry); } else { currentStackIndex=idx; renderStackPage(); } }; });
    }

    function renderReadPage() {
        if(!currentEntry) { showCoverView(); return; }
        const entry=currentEntry, bg=entry.cardColor||"#FFF3E6", align=entry.textAlign||"left";
        document.getElementById("readView").innerHTML=`<div class="read-header"><button class="action-icon" id="backToStackBtn"><i class="fas fa-arrow-left"></i> 翻回</button><button class="action-icon" id="deleteEntryBtn"><i class="fas fa-trash-alt"></i> 删除</button><button class="action-icon" id="editEntryBtn"><i class="fas fa-edit"></i> 更改</button></div><div class="diary-title" style="background:${bg}40; display:inline-block; padding:6px 14px; border-radius:40px;">${escapeHtml(entry.title)}</div><div class="diary-meta"><span><i class="far fa-calendar-check"></i> 日期：${escapeHtml(entry.diaryDate||'未设置')}</span></div><div class="diary-body" style="text-align:${align};">${entry.contentHtml||escapeHtml(entry.content).replace(/\n/g,'<br>')}</div><div style="margin-top:16px; font-size:0.7rem; color:var(--text-muted);">最后编辑: ${new Date(entry.updatedAt).toLocaleString()}</div>`;
        document.getElementById("backToStackBtn").onclick=()=>showStackView();
        document.getElementById("deleteEntryBtn").onclick=async()=>{ if(confirm("删除？")){ appData.entries=appData.entries.filter(e=>e.id!==entry.id); await saveToCloud(); renderNotebookList(); if(getCurrentEntries().length===0) showCoverView(); else { currentStackIndex=0; showStackView(); } } };
        document.getElementById("editEntryBtn").onclick=()=>showEditView(entry,false);
    }

    function applyFormat(cmd,val=null) { const ed=document.getElementById("richEditor"); if(!ed) return; ed.focus(); if(cmd==='formatBlock') document.execCommand('formatBlock',false,val); else if(cmd==='foreColor'||cmd==='hiliteColor'){ document.execCommand('styleWithCSS',false,true); document.execCommand(cmd,false,val); } else document.execCommand(cmd,false,val); }

    function renderEditPage(isNew=false) {
        const notebook = appData.notebooks.find(n=>n.id===currentNotebookId);
        if(!notebook) return;
        let titleVal="", contentHtmlVal="", cardColor="#FFF3E6", diaryDate=new Date().toISOString().slice(0,10), textAlignVal="left", selectedNotebookId=currentNotebookId;
        if(currentEntry&&!isNew) { titleVal=currentEntry.title; contentHtmlVal=currentEntry.contentHtml||escapeHtml(currentEntry.content).replace(/\n/g,'<br>'); cardColor=currentEntry.cardColor; diaryDate=currentEntry.diaryDate; textAlignVal=currentEntry.textAlign||"left"; selectedNotebookId=currentEntry.notebookId; }
        const fontOptions=[{value:"system-ui, sans-serif",label:"系统"},{value:"Georgia, serif",label:"Georgia"},{value:"'Courier New', monospace",label:"等宽"},{value:"Verdana, sans-serif",label:"Verdana"}];
        const notebookOptions = appData.notebooks.map(nb=>`<option value="${nb.id}" ${selectedNotebookId===nb.id?'selected':''}>${escapeHtml(nb.name)}</option>`).join('');
        const html=`<div class="edit-header"><button class="action-icon" id="cancelEditBtn"><i class="fas fa-times"></i> 取消</button></div><div class="edit-form"><input type="text" id="editTitle" placeholder="Dear Diary" value="${escapeHtml(titleVal)}"><div class="options-row"><div class="color-row"><label>🎨 卡片颜色</label><input type="color" id="editCardColor" value="${cardColor}"></div><div class="date-row"><label>📅 日记日期</label><input type="date" id="editDiaryDate" value="${diaryDate}"></div><div class="notebook-select-row"><label>📓 所属日记本</label><select id="editNotebookId">${notebookOptions}</select></div></div><div id="richEditor" class="rich-editor" contenteditable="true">${contentHtmlVal}</div><div class="rich-toolbar"><button type="button" class="tool-btn" data-cmd="bold"><strong>B</strong></button><button type="button" class="tool-btn" data-cmd="italic"><em>I</em></button><button type="button" class="tool-btn" data-cmd="underline"><u>U</u></button><button type="button" class="tool-btn" data-cmd="strikeThrough"><s>S</s></button><button type="button" class="tool-btn" data-cmd="insertUnorderedList">• 列表</button><button type="button" class="tool-btn" data-cmd="justifyLeft">左对齐</button><button type="button" class="tool-btn" data-cmd="justifyCenter">居中</button><button type="button" class="tool-btn" data-cmd="justifyRight">右对齐</button><button type="button" class="tool-btn" data-cmd="justifyFull">两端</button><input type="color" id="textColorPicker" class="color-picker" title="文字颜色"><input type="color" id="bgColorPicker" class="color-picker" title="背景高亮"><button type="button" class="tool-btn" data-cmd="removeFormat">清除格式</button><select id="fontSelect" class="font-select">${fontOptions.map(f=>`<option value="${f.value}">${f.label}</option>`).join('')}</select></div><div class="save-wrapper"><button class="save-btn" id="saveDiaryBtn">Save</button></div></div>`;
        document.getElementById("editView").innerHTML=html;
        const editor=document.getElementById("richEditor");
        const fontSelect=document.getElementById("fontSelect");
        const savedFont=localStorage.getItem("editor_font")||"system-ui, sans-serif";
        if(fontSelect){ fontSelect.value=savedFont; editor.style.fontFamily=savedFont; fontSelect.onchange=()=>{ editor.style.fontFamily=fontSelect.value; localStorage.setItem("editor_font",fontSelect.value); }; }
        let currentAlign = textAlignVal;
        const setAlign = (align) => {
            currentAlign = align;
            editor.style.textAlign = align;
            if (align === 'left') document.execCommand('justifyLeft', false);
            else if (align === 'center') document.execCommand('justifyCenter', false);
            else if (align === 'right') document.execCommand('justifyRight', false);
            else if (align === 'justify') document.execCommand('justifyFull', false);
        };
        setAlign(currentAlign);
        document.querySelectorAll("[data-cmd]").forEach(btn => {
            btn.addEventListener("click", () => {
                const cmd = btn.dataset.cmd;
                applyFormat(cmd);
                if (cmd === 'justifyLeft') currentAlign = 'left';
                else if (cmd === 'justifyCenter') currentAlign = 'center';
                else if (cmd === 'justifyRight') currentAlign = 'right';
                else if (cmd === 'justifyFull') currentAlign = 'justify';
            });
        });
        document.getElementById("textColorPicker")?.addEventListener("input",e=>applyFormat("foreColor",e.target.value));
        document.getElementById("bgColorPicker")?.addEventListener("input",e=>applyFormat("hiliteColor",e.target.value));
        document.getElementById("cancelEditBtn")?.addEventListener("click",()=>{ if(currentEntry&&!isNew) showReadView(currentEntry); else showStackView(); });
        document.getElementById("saveDiaryBtn")?.addEventListener("click",async()=>{
            const newTitle=document.getElementById("editTitle").value.trim();
            const newContentHtml=editor.innerHTML;
            const newColor=document.getElementById("editCardColor").value;
            const newDiaryDate=document.getElementById("editDiaryDate").value;
            const newNotebookId=document.getElementById("editNotebookId").value;
            if(!newTitle||!newDiaryDate) { alert("标题和日期不能为空"); return; }
            const now=new Date().toISOString();
            if(currentEntry&&!isNew){
                currentEntry.title=newTitle; currentEntry.contentHtml=newContentHtml; currentEntry.content=editor.innerText; currentEntry.cardColor=newColor; currentEntry.diaryDate=newDiaryDate; currentEntry.textAlign=currentAlign; currentEntry.updatedAt=now; currentEntry.notebookId=newNotebookId;
                const idx=appData.entries.findIndex(e=>e.id===currentEntry.id);
                if(idx!==-1) appData.entries[idx]=currentEntry;
            } else {
                const newId="e_"+Date.now()+"_"+Math.random();
                appData.entries.push({ id:newId, notebookId:newNotebookId, title:newTitle, contentHtml:newContentHtml, content:editor.innerText, cardColor:newColor, diaryDate:newDiaryDate, textAlign:currentAlign, createdAt:now, updatedAt:now });
                currentEntry=null;
            }
            await saveToCloud();
            renderNotebookList();
            if(currentEntry&&!isNew) showReadView(currentEntry);
            else { currentStackIndex=0; showStackView(); }
            currentEntry=null;
        });
        editor.addEventListener('paste',(e)=>{
            e.preventDefault();
            const text = (e.clipboardData || window.clipboardData).getData('text/plain');
            document.execCommand('insertHTML', false, text.replace(/\n/g,'<br>'));
        });
    }

    const fireworkTypes=['burst','heart','star','circle'];
    function createFirework(type){
        const layer=document.createElement('div'); layer.className='firework-layer'; document.body.appendChild(layer);
        const cx=window.innerWidth/2, cy=window.innerHeight/2;
        let count=type==='heart'?50:120;
        for(let i=0;i<count;i++){
            let angle,speed;
            if(type==='burst'){ angle=Math.random()*Math.PI*2; speed=150+Math.random()*280; }
            else if(type==='heart'){ const t=Math.random()*Math.PI*2; const x=16*Math.pow(Math.sin(t),3); const y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t); angle=Math.atan2(y,x); speed=120+Math.random()*180; }
            else if(type==='star'){ angle=Math.random()*Math.PI*2; speed=180+Math.random()*250; }
            else{ angle=Math.random()*Math.PI*2; speed=130+Math.random()*220; }
            const tx=Math.cos(angle)*speed*(type==='star'?1.3:1), ty=Math.sin(angle)*speed;
            const p=document.createElement('div');
            if(type==='heart'){ p.className='heart-particle'; p.textContent='❤️'; } else { p.className='firework-particle'; const hue=Math.random()*360; p.style.background=`radial-gradient(circle, hsl(${hue},100%,65%), hsl(${hue},80%,40%))`; }
            p.style.left=cx+'px'; p.style.top=cy+'px'; p.style.setProperty('--tx',tx+'px'); p.style.setProperty('--ty',ty+'px');
            layer.appendChild(p); setTimeout(()=>p.remove(),1600);
        }
        setTimeout(()=>layer.remove(),1700);
    }
    function randomFirework(){ createFirework(fireworkTypes[Math.floor(Math.random()*fireworkTypes.length)]); }
    function startPetalFall(){ for(let i=0;i<80;i++) setTimeout(()=>{ const p=document.createElement('div'); p.className='petal'; const icons=['🌸','🌼','🍃','✨','🐾','❤️','🌟']; p.textContent=icons[Math.floor(Math.random()*icons.length)]; p.style.left=Math.random()*window.innerWidth+'px'; p.style.top='-30px'; p.style.fontSize=(18+Math.random()*14)+'px'; p.style.animation=`fall 2.5s ease-in forwards`; document.body.appendChild(p); setTimeout(()=>p.remove(),2500); },i*35); }

    async function initAuth() {
        try {
            await auth.signInAnonymously();
            currentUser = auth.currentUser;
            document.getElementById("userEmail").textContent = "匿名用户";
            document.getElementById("userInfoArea").style.display = "flex";
            await loadFromCloud();
        } catch (err) {
            showError("登录失败：" + err.message + "。请检查：1) 环境ID是否正确 2) 匿名登录是否开启 3) 网络是否通畅");
        }
    }

    function resetData() {
        if(confirm("重置将清除所有本地缓存并重新登录，是否继续？")) {
            localStorage.clear();
            location.reload();
        }
    }

    function initTheme() {
        const themeBtns = document.querySelectorAll('.theme-btn');
        const themeHandler = (e) => {
            const theme = e.currentTarget.dataset.theme;
            document.body.classList.remove('light', 'dark', 'warm');
            document.body.classList.add(theme);
            localStorage.setItem('diary_theme', theme);
        };
        themeBtns.forEach(btn => {
            btn.removeEventListener('click', themeHandler);
            btn.addEventListener('click', themeHandler);
        });
        const savedTheme = localStorage.getItem('diary_theme');
        if (savedTheme) {
            document.body.classList.remove('light', 'dark', 'warm');
            document.body.classList.add(savedTheme);
        } else {
            document.body.classList.add('light');
        }
    }

    document.getElementById("toggleSidebarBtn").addEventListener("click", toggleSidebar);
    document.getElementById("addDiaryBtn").onclick=()=>showEditView(null,true);
    document.getElementById("addNotebookBtn").onclick=async()=>{ const name=prompt("日记本名称"); if(name){ const newId="nb_"+Date.now(); appData.notebooks.push({ id:newId, name:name, coverImageUrl:"https://picsum.photos/id/101/400/500" }); await saveToCloud(); await switchNotebook(newId); } };
    document.getElementById("importBtn").onclick=()=>{ const input=document.createElement("input"); input.type="file"; input.accept="application/json"; input.onchange=async(e)=>{ const file=e.target.files[0]; if(file){ const reader=new FileReader(); reader.onload=async(ev)=>{ try{ const imported=JSON.parse(ev.target.result); if(imported.notebooks&&imported.entries){ appData=imported; for(let e of appData.entries){ if(!e.cardColor) e.cardColor="#FFF3E6"; if(!e.diaryDate) e.diaryDate=new Date().toISOString().slice(0,10); if(!e.textAlign) e.textAlign="left"; if(!e.contentHtml) e.contentHtml=escapeHtml(e.content).replace(/\n/g,'<br>'); } await saveToCloud(); if(appData.notebooks.length) currentNotebookId=appData.notebooks[0].id; else initDefaultData(); renderNotebookList(); showCoverView(); refreshCurrentUI(); alert("导入成功"); } else alert("格式错误"); } catch(err){ alert("解析失败"); } }; reader.readAsText(file); } }; input.click(); };
    document.getElementById("exportBtn").onclick=()=>{ const dataStr=JSON.stringify(appData,null,2); const blob=new Blob([dataStr],{type:"application/json"}); const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=`dear_diary_${new Date().toISOString().slice(0,19)}.json`; a.click(); URL.revokeObjectURL(url); };
    document.getElementById("listNotebooksBtn").onclick=()=>document.querySelector(".notebook-list-section").scrollIntoView({behavior:"smooth"});
    document.getElementById("easterEggBtn").onclick=()=>startPetalFall();
    document.getElementById("logoutBtn").onclick=()=>resetData();

    const sidebar=document.getElementById("sidebar");
    sidebar.addEventListener("dblclick",(e)=>{ if(!e.target.closest('.nav-btn') && !e.target.closest('.notebook-item') && !e.target.closest('.toggle-sidebar-btn') && !e.target.closest('.theme-switch')) randomFirework(); });

    loadSidebarState();
    initTheme();
    initAuth();
</script>
</body>
</html>
